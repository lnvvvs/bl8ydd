<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RepForge</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #050505;
      color: white;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(255,0,0,0.18) 0%, transparent 70%);
      top: -200px;
      right: -200px;
      z-index: -1;
      animation: pulse 6s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { 
        transform: scale(1); 
        opacity: 0.6; 
      }

      50% { 
        transform: scale(1.15); 
        opacity: 1; 
      }
    }

    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .hero {
      text-align: center;
      width: 100%;
      max-width: 1100px;
      animation: fadeUp 1s ease;
    }

    @keyframes fadeUp {
      from { 
        opacity: 0; 
        transform: translateY(40px); 
      }

      to { 
        opacity: 1; 
        transform: translateY(0); 
      }
    }

    .logo {
      width: min(260px, 65vw);
      margin-bottom: 22px;
      filter: drop-shadow(0 0 25px rgba(255,0,0,0.35));
      transition: transform 0.4s ease;
    }

    .logo:hover {
      transform: scale(1.05) rotate(-1deg);
    }

    h1 {
      font-size: clamp(2.8rem, 10vw, 5rem);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 0.95;
      margin-bottom: 18px;
      word-break: break-word;
    }

    h1 span {
      color: #ff2b2b;
    }

    .subtitle {
      color: #b3b3b3;
      font-size: clamp(1rem, 4vw, 1.3rem);
      max-width: 700px;
      margin: auto;
      line-height: 1.6;
      margin-bottom: 38px;
      padding: 0 10px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .btn {
      padding: 18px 34px;
      border-radius: 18px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s ease;
      display: inline-block;
      cursor: pointer;
      width: fit-content;
    }

    .primary {
      background: linear-gradient(135deg, #ff1f1f, #b30000);
      color: white;
      box-shadow: 0 10px 30px rgba(255,0,0,0.35);
    }

    .primary:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 15px 35px rgba(255,0,0,0.5);
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .container {
        padding: 30px 18px;
      }

      .bg-glow {
        width: 500px;
        height: 500px;
        top: -180px;
        right: -180px;
      }

      .logo {
        margin-bottom: 18px;
      }

      .subtitle {
        margin-bottom: 30px;
      }

      .btn {
        width: 100%;
        max-width: 320px;
        padding: 16px 20px;
        font-size: 0.95rem;
        border-radius: 16px;
      }
    }

    /* SMALL PHONES */
    @media (max-width: 480px) {
      h1 {
        letter-spacing: -1px;
      }

      .subtitle {
        line-height: 1.5;
      }

      .btn {
        font-size: 0.92rem;
      }
    }
  </style>
</head>

<body>
  <div class="bg-glow"></div>

  <div class="container">
    <div class="hero">

      <img src="logo.png" class="logo" alt="RepForge Logo"/>

      <h1>REP<span>FORGE</span></h1>

      <p class="subtitle">
        Train. Track. Transform.
      </p>

      <div class="buttons">
        <a 
          href="https://github.com/lnvvvs/bl8ydd/releases/download/v.2.0.0/app.apk"
          class="btn primary"
        >
          Download Android APK
        </a>
      </div>

    </div>
  </div>

</body>
</html>
