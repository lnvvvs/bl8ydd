<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RepForge</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #050505;
      color: white;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(255,0,0,0.18) 0%, transparent 70%);
      top: -200px;
      right: -200px;
      z-index: -1;
      animation: pulse 6s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .hero {
      text-align: center;
      max-width: 1100px;
      animation: fadeUp 1s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      width: 260px;
      margin-bottom: 25px;
      filter: drop-shadow(0 0 25px rgba(255,0,0,0.35));
      transition: transform 0.4s ease;
    }

    .logo:hover {
      transform: scale(1.05) rotate(-1deg);
    }

    h1 {
      font-size: 5rem;
      font-weight: 900;
      letter-spacing: -3px;
      margin-bottom: 20px;
    }

    h1 span {
      color: #ff2b2b;
    }

    .subtitle {
      color: #b3b3b3;
      font-size: 1.3rem;
      max-width: 700px;
      margin: auto;
      line-height: 1.7;
      margin-bottom: 45px;
    }

    .buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 70px;
    }

    .btn {
      padding: 18px 34px;
      border-radius: 18px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .primary {
      background: linear-gradient(135deg, #ff1f1f, #b30000);
      color: white;
      box-shadow: 0 10px 30px rgba(255,0,0,0.35);
    }

    .primary:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 15px 35px rgba(255,0,0,0.5);
    }

    .secondary {
      border: 1px solid #444;
      color: white;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
    }

    .secondary:hover {
      background: white;
      color: black;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 35px;
      transition: all 0.4s ease;
      backdrop-filter: blur(12px);
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: rgba(255,0,0,0.5);
      box-shadow: 0 10px 35px rgba(255,0,0,0.18);
    }

    .card-icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .card h2 {
      margin-bottom: 12px;
      font-size: 1.5rem;
    }

    .card p {
      color: #b0b0b0;
      line-height: 1.6;
    }

    footer {
      margin-top: 80px;
      color: #666;
      font-size: 0.95rem;
    }

    @media(max-width: 768px) {
      h1 {
        font-size: 3.2rem;
      }

      .subtitle {
        font-size: 1.05rem;
      }

      .logo {
        width: 200px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="container">
    <div class="hero">
      <img src="logo.png" alt="RepForge Logo" class="logo">

      <h1>REP<span>FORGE</span></h1>

      <p class="subtitle">
        Train. Track. Transform.
      </p>

      <div class="buttons">
        <a href="app.apk" class="btn primary">Download Android APK</a>
      </div>
    </div>
  </div>
</body>
</html>
